<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cycling DashCam</title>
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="/manifest.json?v=59" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/dashcam/192/192" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Global PWA prompt capture
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        // Dispatch custom event to notify React
        window.dispatchEvent(new CustomEvent('pwa-prompt-available'));
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service worker registered:', reg))
            .catch(err => console.error('Service worker registration failed:', err));
        });
      }
    </script>
    <script>
      // Aggressive cache clearing if version is old
      const CURRENT_VERSION = '1.17.30';
      const storedVersion = localStorage.getItem('app_version');
      if (storedVersion && storedVersion !== CURRENT_VERSION) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              registration.unregister();
            }
          });
        }
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
        localStorage.setItem('app_version', CURRENT_VERSION);
        window.location.reload();
      } else {
        localStorage.setItem('app_version', CURRENT_VERSION);
      }
    </script>
    <script>
      // Simple force update script
      if (window.location.search.includes('force_update')) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) registration.unregister();
            window.location.href = window.location.pathname;
          });
        }
      }
    </script>
  </body>
</html>
